  - url: http://localhost:8080
    description: Orchestrator (MCP + A2A)
  - url: http://localhost:8081
    description: Shell worker
  - url: http://localhost:8082
    description: Web worker
  - url: http://localhost:8083
    description: AI worker
  - url: http://localhost:8084
    description: Code worker
  - url: http://localhost:8085
    description: Knowledge worker
  - url: http://localhost:8086
    description: Design worker
  - url: http://localhost:8087
    description: Factory worker
  - url: http://localhost:8088
    description: Data worker
  - url: http://localhost:8089
    description: News worker
  - url: http://localhost:8090
    description: Market worker
  - url: http://localhost:8091
    description: Signal worker
  - url: http://localhost:8092
    description: Monitor worker
  - url: http://localhost:8093
    description: Infra worker
  - url: http://localhost:8094
    description: Climate worker
  - url: http://localhost:8095
    description: Supply-chain worker

tags:
  - name: agent-discovery
    description: Agent card discovery and registry management
  - name: task-lifecycle
    description: A2A task creation, polling, cancellation, and SSE streaming
  - name: webhooks
    description: Webhook ingestion from external services (GitHub, Stripe, etc.)
  - name: health
    description: Health checks and readiness probes
  - name: metrics
    description: Skill execution metrics and observability
  - name: mcp-core
    description: |
      MCP tools — Core delegation, sandbox execution, and agent management.
      These are invoked over stdio JSON-RPC by Claude Code, not over HTTP.
  - name: mcp-workflows
    description: MCP tools — Workflow engine, design pipeline, and factory pipeline
  - name: mcp-events
    description: MCP tools — Event bus pub/sub
  - name: mcp-observability
    description: MCP tools — Traces, cache, circuit breakers, audit log, metrics
  - name: mcp-erp
    description: MCP tools — ERP connector management (Odoo, Business Central, Dynamics)
  - name: mcp-osint
    description: MCP tools — OSINT intelligence orchestration
  - name: mcp-enterprise
    description: MCP tools — Workspaces, RBAC, licensing, compliance
  - name: mcp-consulting
    description: MCP tools — S&OP, ESG, supply chain, revenue intelligence

paths:
  # ── Agent Discovery ──────────────────────────────────────────────────────────

  /.well-known/agent.json:
    get:
      tags: [agent-discovery]
      summary: Get agent card
      description: |
        Returns the orchestrator's A2A agent card listing all skills across all
        registered workers. Every worker exposes the same endpoint on its own port.
        The orchestrator aggregates all worker skill descriptors into a single card.
      operationId: getAgentCard
      security: []
      responses:
        '200':
          description: Agent card
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentCard'
              example:
                name: "Local A2A Orchestrator"
                description: "MCP + A2A orchestrator with multi-agent workers"
                url: "http://localhost:8080"
                version: "3.0.0"
                capabilities:
                  streaming: false
                skills:
                  - id: "delegate"
                    name: "Delegate"
                    description: "Route a task to the best worker agent."
                  - id: "run_shell"
                    name: "Run Shell"
                    description: "Execute a shell command and return its output"

  # ── A2A JSON-RPC endpoint ────────────────────────────────────────────────────

  /:
    post:
      tags: [task-lifecycle]
      summary: A2A JSON-RPC endpoint (tasks/send, tasks/get, tasks/cancel)
      description: |
        Single JSON-RPC 2.0 endpoint. Supports three methods:

        - **tasks/send** — create and execute a task synchronously (or asynchronously)
        - **tasks/get** — poll an existing task by ID
        - **tasks/cancel** — cancel an in-progress task

        All methods share the same path and are distinguished by the `method` field.

        ### tasks/send params
        | Field | Type | Required | Description |
        |-------|------|----------|-------------|
        | skillId | string | yes* | Skill to invoke |
        | args | object | no | Skill arguments |
        | message | object | no | A2A message envelope (alternative to skillId+args) |
        | contextId | string | no | Session ID for conversation continuity |
        | id | string | no | Caller-assigned task ID (UUID recommended) |

        *`skillId` required unless using the `message` envelope form.
      operationId: a2aJsonRpc
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/TasksSendRequest'
                - $ref: '#/components/schemas/TasksGetRequest'
                - $ref: '#/components/schemas/TasksCancelRequest'
            examples:
              tasks_send:
                summary: Run a shell command
                value:
                  jsonrpc: "2.0"
                  method: "tasks/send"
                  id: "req-1"
                  params:
                    skillId: "run_shell"
                    args:
                      command: "echo hello"
              tasks_get:
                summary: Poll an async task
                value:
                  jsonrpc: "2.0"
                  method: "tasks/get"
                  id: "req-2"
                  params:
                    id: "task-uuid-here"
      responses:
        '200':
          description: JSON-RPC response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonRpcResponse'
              examples:
                success:
                  summary: Completed task
                  value:
                    jsonrpc: "2.0"
                    id: "req-1"
                    result:
                      id: "task-abc123"
                      status:
                        state: "completed"
                      artifacts:
                        - parts:
                            - kind: "text"
                              text: "hello\n"
                error:
                  summary: Skill not found
                  value:
                    jsonrpc: "2.0"
                    id: "req-1"
                    error:
                      code: -32601
                      message: "Skill not found: unknown_skill"
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ── Task SSE streaming ───────────────────────────────────────────────────────

  /tasks/{taskId}/events:
    get:
      tags: [task-lifecycle]
      summary: Stream task events (SSE)
      description: |
        Server-Sent Events stream for a running async task. Sends events as the
        task progresses, plus a terminal `result` or `error` event.

        **Event types:**

        ```
        event: state
        data: {"taskId":"...","state":"working","progress":"Step 1 of 3"}

        event: progress
        data: {"taskId":"...","message":"Generating screen 2 of 5…"}

        event: result
        data: {"taskId":"...","result":"<final output>"}

        event: error
        data: {"taskId":"...","error":"Workflow failed: ..."}
        ```

        The stream closes after the terminal event.
      operationId: streamTaskEvents
      security:
        - BearerAuth: []
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            example: "task-abc123"
          description: Task ID returned by `tasks/send` or any `*_workflow` MCP tool
      responses:
        '200':
          description: SSE stream (closes after terminal result/error event)
          content:
            text/event-stream:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Webhook ingestion ────────────────────────────────────────────────────────

  /webhooks/{webhookId}:
    post:
      tags: [webhooks]
      summary: Receive an incoming webhook
      description: |
        Accepts a JSON payload from an external service (GitHub, Stripe, etc.).
        Validates the HMAC-SHA256 signature in the `X-Hub-Signature-256` header,
        transforms the payload using configured field mappings, then asynchronously
        dispatches the configured skill.

        **Rate limit:** 60 requests/minute per IP.

        **Blocked skills (defense-in-depth):** run_shell, run_shell_stream,
        write_file, read_file, codex_exec, sandbox_execute, sandbox_vars,
        search_files, query_sqlite, workflow_execute, fetch_rss, aggregate_feeds,
        regulatory_scan.

        Register webhooks with the `register_webhook` MCP tool. The secret used
        during registration must be the same one used to compute the signature.
      operationId: receiveWebhook
      security: []
      parameters:
        - name: webhookId
          in: path
          required: true
          schema:
            type: string
            example: "a1b2c3d4"
          description: Webhook ID (8-char UUID prefix) from `register_webhook`
        - name: X-Hub-Signature-256
          in: header
          required: true
          schema:
            type: string
            example: "sha256=abc123def456..."
          description: HMAC-SHA256 of the raw request body (prefix with `sha256=`)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Arbitrary JSON payload from the external service
            example:
              action: "push"
              ref: "refs/heads/main"
              repository:
                full_name: "org/repo"
      responses:
        '200':
          description: Webhook accepted (async) or completed (sync)
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      status:
                        type: string
                        enum: [accepted]
                      taskId:
                        type: string
                    required: [status, taskId]
                  - type: object
                    properties:
                      status:
                        type: string
                        enum: [completed]
                      result:
                        type: string
                    required: [status, result]
              examples:
                async:
                  value:
                    status: "accepted"
                    taskId: "task-abc123"
        '401':
          description: Missing or invalid HMAC-SHA256 signature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Invalid signature"
        '403':
          description: Webhook disabled or skill is on the blocklist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          description: Rate limit exceeded (60 req/min per IP)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Rate limit exceeded"

  # ── Health ───────────────────────────────────────────────────────────────────

  /healthz:
    get:
      tags: [health]
      summary: Basic liveness check
      description: Returns HTTP 200 with `{"status":"alive"}` if the service process is running. Suitable for container liveness probes.
      operationId: healthCheck
      security: []
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [alive]
                  timestamp:
                    type: string
                    format: date-time
                required: [status, timestamp]
              example:
                status: "alive"
                timestamp: "2026-03-14T12:00:00.000Z"

  /healthz/details:
    get:
      tags: [health]
      summary: Detailed health snapshot
      description: |
        Returns uptime, per-worker health status, active task counts, and ERP
        connector KPIs. Suitable for readiness probes and monitoring dashboards.
      operationId: healthDetails
      security: []
      responses:
        '200':
          description: Detailed health snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthDetails'
              example:
                status: "ok"
                uptime: 3600
                workers:
                  shell: true
                  web: true
                  ai: false
                tasks:
                  total: 42
                  active: 3

  /readyz:
    get:
      tags: [health]
      summary: Readiness probe
      description: Returns HTTP 200 only after all configured workers have been discovered and are ready to accept tasks. Returns 503 during startup.
      operationId: readinessCheck
      security: []
      responses:
        '200':
          description: Ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ready]
                  workersReady:
                    type: integer
                  workersTotal:
                    type: integer
        '503':
          description: Not yet ready — workers still starting up
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Metrics ──────────────────────────────────────────────────────────────────

  /metrics:
    get:
      tags: [metrics]
      summary: Skill execution metrics
      description: |
        Returns per-skill call counts, p50/p95/p99 latencies (in ms), and error
        rates. Also accessible as MCP resource `a2a://metrics`.
      operationId: getMetrics
      security: []
      responses:
        '200':
          description: Metrics snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsSnapshot'
              example:
                run_shell:
                  calls: 150
                  errors: 2
                  p50Ms: 45
                  p95Ms: 320
                  p99Ms: 1100
                fetch_url:
                  calls: 88
                  errors: 5
                  p50Ms: 210
                  p95Ms: 980
                  p99Ms: 2400

  # ── MCP Tools (virtual paths — invoked over stdio, not HTTP) ─────────────────
  # These paths document the MCP tool interface for discoverability.
  # Actual calls go via JSON-RPC over stdin/stdout (Claude Code integration).

  /mcp/tools/sandbox_execute:
    post:
      tags: [mcp-core]
      summary: "MCP: sandbox_execute"
      description: |
        Execute TypeScript code in an isolated Bun subprocess with access to all
        worker skills via `skill(id, args)`. Variables persist across calls per
        session in SQLite. Results >4 KB are auto-indexed for FTS5 full-text search.

        **Sandbox API surface:**
        - `skill(id, args)` — call any registered skill
        - `search(varName, query)` — FTS5 search over stored vars
        - `adapters()` — list all skills with descriptions
        - `describe(id)` — full input schema for a skill
        - `batch(items, fn, {concurrency})` — parallel processing
        - `$vars` — persistent variable store
        - `pick`, `sum`, `count`, `first`, `last`, `table` — data helpers

        Prefer this tool over `delegate` when you need to filter or transform
        results — return only what matters to save tokens.
      operationId: mcpSandboxExecute
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SandboxExecuteInput'
            examples:
              run_code:
                summary: Fetch a URL and summarize
                value:
                  code: |
                    const html = await skill("fetch_url", { url: "https://example.com" });
                    return html.slice(0, 500);
                  sessionId: "my-session"
              list_vars:
                summary: List persisted variables
                value:
                  action: "list_vars"
                  sessionId: "my-session"
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/delegate:
    post:
      tags: [mcp-core]
      summary: "MCP: delegate"
      description: |
        Route a task to the appropriate worker agent. Supports three routing modes:

        1. **Direct URL** (`agentUrl`) — send to a specific worker, bypassing skill lookup
        2. **Skill ID** (`skillId`) — look up which worker owns the skill → forward
        3. **Neither** — ask the AI worker to pick the best agent (auto-routing)

        The call goes through the circuit breaker, skill cache (idempotent skills),
        and is recorded in distributed traces and metrics.

        Set `async: true` for fire-and-forget (returns `taskId`). Pass `taskId` to
        poll the result of a previous async call.
      operationId: mcpDelegate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DelegateInput'
            examples:
              sync_skill:
                summary: Run shell command synchronously
                value:
                  skillId: "run_shell"
                  args:
                    command: "ls -la /tmp"
              async_workflow:
                summary: Fire-and-forget async task
                value:
                  skillId: "ask_claude"
                  args:
                    prompt: "Summarize the latest news"
                  async: true
              poll_result:
                summary: Poll previous async task
                value:
                  taskId: "task-abc123"
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/list_agents:
    post:
      tags: [mcp-core]
      summary: "MCP: list_agents"
      description: List all worker agents (local and external), their URLs, health status, and available skills.
      operationId: mcpListAgents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: {}
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/register_agent:
    post:
      tags: [mcp-core]
      summary: "MCP: register_agent"
      description: |
        Register an external A2A agent by URL. The orchestrator will discover its
        agent card and add its skills to the routing table. Optionally store an API
        key used when forwarding tasks to that agent.
      operationId: mcpRegisterAgent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  format: uri
                  description: Agent URL (e.g. http://host:port)
                  example: "http://remote-agent:8100"
                apiKey:
                  type: string
                  description: Optional Bearer token for the agent
              required: [url]
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/unregister_agent:
    post:
      tags: [mcp-core]
      summary: "MCP: unregister_agent"
      description: Unregister a previously registered external agent and remove its skills from the routing table.
      operationId: mcpUnregisterAgent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  description: Agent URL to unregister
              required: [url]
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/run_shell_stream:
    post:
      tags: [mcp-core]
      summary: "MCP: run_shell_stream"
      description: |
        Execute a shell command with real-time streaming output via MCP progress
        events. Proxies the shell worker's `/stream` SSE endpoint.
      operationId: mcpRunShellStream
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                command:
                  type: string
                  description: Shell command to execute
                  example: "tail -f /var/log/app.log"
                timeoutMs:
                  type: number
                  description: Timeout in milliseconds (default 120000)
                  default: 120000
              required: [command]
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/get_session_history:
    post:
      tags: [mcp-core]
      summary: "MCP: get_session_history"
      description: Retrieve conversation history for a session ID. History is stored in SQLite + Obsidian with a 30-day TTL. Returns up to the last 40 messages (20 turns).
      operationId: mcpGetSessionHistory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionId:
                  type: string
                  description: Session ID to retrieve
              required: [sessionId]
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/clear_session:
    post:
      tags: [mcp-core]
      summary: "MCP: clear_session"
      description: Clear conversation history for a session ID.
      operationId: mcpClearSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionId:
                  type: string
              required: [sessionId]
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/memory_search:
    post:
      tags: [mcp-core]
      summary: "MCP: memory_search"
      description: Full-text search over agent memory (notes/knowledge) stored in SQLite and Obsidian. Returns matching entries with agent name and content.
      operationId: mcpMemorySearch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                  description: Search query string
                agent:
                  type: string
                  description: Limit search to a specific agent namespace
                limit:
                  type: number
                  description: Max results (default 10)
              required: [query]
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/memory_list:
    post:
      tags: [mcp-core]
      summary: "MCP: memory_list"
      description: List all memory entries with optional tag filtering.
      operationId: mcpMemoryList
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tag:
                  type: string
                  description: Optional tag to filter by
                limit:
                  type: number
                  description: Max results (default 50)
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/memory_cleanup:
    post:
      tags: [mcp-core]
      summary: "MCP: memory_cleanup"
      description: Remove stale or orphaned memory entries. No parameters required.
      operationId: mcpMemoryCleanup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: {}
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/get_project_context:
    post:
      tags: [mcp-core]
      summary: "MCP: get_project_context"
      description: Get current project context (summary, goals, tech stack, notes). Stored as JSON + Obsidian note.
      operationId: mcpGetProjectContext
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: {}
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/set_project_context:
    post:
      tags: [mcp-core]
      summary: "MCP: set_project_context"
      description: Update one or more project context fields (summary, goals, stack, notes).
      operationId: mcpSetProjectContext
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                summary:
                  type: string
                goals:
                  type: array
                  items:
                    type: string
                stack:
                  type: array
                  items:
                    type: string
                notes:
                  type: string
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/sandbox_vars:
    post:
      tags: [mcp-core]
      summary: "MCP: sandbox_vars"
      description: Manage sandbox persisted variables — list all variables in a session, get a specific variable's value, or delete a variable.
      operationId: mcpSandboxVars
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum: [list, get, delete]
                  description: Action to perform
                sessionId:
                  type: string
                  description: Session ID
                name:
                  type: string
                  description: Variable name (required for get/delete)
              required: [action, sessionId]
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/list_mcp_servers:
    post:
      tags: [mcp-core]
      summary: "MCP: list_mcp_servers"
      description: List all registered MCP servers and their available tools.
      operationId: mcpListMcpServers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: {}
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/use_mcp_tool:
    post:
      tags: [mcp-core]
      summary: "MCP: use_mcp_tool"
      description: Call a tool on any registered MCP server. Enables composing tools across multiple MCP registrations.
      operationId: mcpUseMcpTool
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                server:
                  type: string
                  description: MCP server name
                tool:
                  type: string
                  description: Tool name to call
                args:
                  type: object
                  description: Tool arguments
              required: [server, tool]
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  # ── MCP: Workflow tools ──────────────────────────────────────────────────────

  /mcp/tools/workflow_execute:
    post:
      tags: [mcp-workflows]
      summary: "MCP: workflow_execute"
      description: |
        Execute a multi-step workflow as a directed acyclic graph (DAG). Steps
        run in parallel where dependencies allow. Returns `{taskId}` immediately —
        poll with `delegate(taskId: "...")` or the SSE stream.

        **Step features:**
        - `dependsOn: [stepId]` — declare execution order
        - `args: { key: "{{stepId.result}}" }` — pipe outputs between steps
        - `onError: "fail" | "skip" | "retry"` — per-step error handling
        - `when: "{{stepId.result}}"` — conditional execution
        - `maxConcurrency` — limit parallel step execution
      operationId: mcpWorkflowExecute
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowExecuteInput'
            example:
              workflow:
                id: "research-and-save"
                name: "Research and Save"
                steps:
                  - id: "fetch"
                    skillId: "fetch_url"
                    args:
                      url: "https://example.com/data.json"
                  - id: "analyze"
                    skillId: "ask_claude"
                    args:
                      prompt: "Summarize: {{fetch.result}}"
                    dependsOn: ["fetch"]
                  - id: "save"
                    skillId: "create_note"
                    args:
                      title: "Research"
                      content: "{{analyze.result}}"
                    dependsOn: ["analyze"]
      responses:
        '200':
          $ref: '#/components/responses/McpTaskIdResult'

  /mcp/tools/design_workflow:
    post:
      tags: [mcp-workflows]
      summary: "MCP: design_workflow"
      description: |
        Full design pipeline: Gemini suggests screens → creates a Stitch project →
        generates each screen in parallel. Returns `{taskId}` immediately — poll
        with `delegate(taskId)` or SSE stream.

        Requires the design worker (port 8086) and Stitch MCP server to be running.
        Auth: `GOOGLE_API_KEY` or Gemini OAuth via `~/.gemini/`.
      operationId: mcpDesignWorkflow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DesignWorkflowInput'
            example:
              appConcept: "A fitness tracking app with social features"
              title: "FitSync"
              deviceType: "MOBILE"
      responses:
        '200':
          $ref: '#/components/responses/McpTaskIdResult'

  /mcp/tools/factory_workflow:
    post:
      tags: [mcp-workflows]
      summary: "MCP: factory_workflow"
      description: |
        Full project generation pipeline: normalize idea → scaffold → generate
        code → quality review ("Ralph Mode" multi-dimension scoring with fix
        loops). Returns `{taskId}` immediately.

        **Pipelines:** `app` (Expo), `website` (Next.js), `mcp-server` (MCP + Bun),
        `agent` (AI agent), `api` (REST API), `cli` (CLI tool).

        Timeout: up to 10 minutes for large pipelines.
      operationId: mcpFactoryWorkflow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FactoryWorkflowInput'
            example:
              idea: "A CLI tool that converts markdown to PDF with syntax highlighting"
              pipeline: "cli"
              outputDir: "/tmp/my-cli-tool"
      responses:
        '200':
          $ref: '#/components/responses/McpTaskIdResult'

  /mcp/tools/compose_pipeline:
    post:
      tags: [mcp-workflows]
      summary: "MCP: compose_pipeline"
      description: |
        Create a reusable named skill pipeline. Each step's output feeds the
        next. Supports template references: `{{prev.result}}`, `{{input.*}}`,
        `{{steps.alias.result}}`. Pipelines are persisted in memory and can be
        executed with `execute_pipeline`.
      operationId: mcpComposePipeline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Pipeline name
                description:
                  type: string
                steps:
                  type: array
                  description: "Pipeline steps: [{ skillId, args?, transform?, as?, when?, onError? }]"
                  items:
                    type: object
              required: [name, steps]
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/execute_pipeline:
    post:
      tags: [mcp-workflows]
      summary: "MCP: execute_pipeline"
      description: Execute a composed pipeline by ID or name. Returns `{taskId}` — poll with `delegate(taskId)`.
      operationId: mcpExecutePipeline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pipeline:
                  type: string
                  description: Pipeline ID or name
                input:
                  type: object
                  description: "Input data available as {{input.*}} in steps"
              required: [pipeline]
      responses:
        '200':
          $ref: '#/components/responses/McpTaskIdResult'

  /mcp/tools/list_pipelines:
    post:
      tags: [mcp-workflows]
      summary: "MCP: list_pipelines"
      description: List all registered skill composition pipelines.
      operationId: mcpListPipelines
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: {}
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/collaborate:
    post:
      tags: [mcp-workflows]
      summary: "MCP: collaborate"
      description: |
        Multi-agent collaboration using configurable strategies:

        - **fan_out** — query all agents in parallel, merge results
        - **consensus** — fan out, score each response with an AI judge, return the best
        - **debate** — agents critique each other's answers iteratively
        - **map_reduce** — distribute items across agents, aggregate results

        Returns `{taskId}` — poll with `delegate(taskId)`.
      operationId: mcpCollaborate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollaborateInput'
            example:
              strategy: "consensus"
              query: "What is the best approach to handle rate limiting in a distributed system?"
              agents: ["ask_claude", "codex_review"]
              mergeStrategy: "best_score"
      responses:
        '200':
          $ref: '#/components/responses/McpTaskIdResult'

  /mcp/tools/agency_workflow_templates:
    post:
      tags: [mcp-workflows]
      summary: "MCP: agency_workflow_templates"
      description: Return three pre-built agency workflow templates (reporting, client approval gate, client handoff) with ready-to-adapt `workflow_execute` definitions.
      operationId: mcpAgencyWorkflowTemplates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: {}
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/agency_roi_snapshot:
    post:
      tags: [mcp-workflows]
      summary: "MCP: agency_roi_snapshot"
      description: Compute agency KPI snapshot — runs completed, failure rate, estimated hours saved, manual steps removed, and token savings.
      operationId: mcpAgencyRoiSnapshot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                since:
                  type: string
                  format: date-time
                  description: Optional ISO timestamp lower bound
                assumedMinutesSavedPerSuccessfulRun:
                  type: number
                  description: Minutes saved per run (default 20)
                assumedManualStepsRemovedPerRun:
                  type: number
                  description: Manual steps removed per run (default 4)
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  # ── MCP: Event Bus ───────────────────────────────────────────────────────────

  /mcp/tools/event_publish:
    post:
      tags: [mcp-events]
      summary: "MCP: event_publish"
      description: |
        Publish an event to the agent event bus. Subscribers whose topic pattern
        matches will be notified. Topics use dot-separated segments.

        Events are auto-published on agent completion/failure in the `delegate` flow.
      operationId: mcpEventPublish
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                topic:
                  type: string
                  description: "Dot-separated topic (e.g. 'agent.shell.completed')"
                  example: "workflow.step.done"
                data:
                  type: object
                  description: Event payload
                source:
                  type: string
                  description: Source agent name (default 'user')
                correlationId:
                  type: string
                  description: Correlation ID for tracing event chains
              required: [topic]
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/event_subscribe:
    post:
      tags: [mcp-events]
      summary: "MCP: event_subscribe"
      description: |
        Subscribe to events matching a topic pattern. Returns a subscription ID.
        Wildcard support: `*` matches one segment, `#` matches multiple segments.

        Examples: `agent.*` matches `agent.shell`, `agent.web`.
        `workflow.#` matches `workflow.step.done`, `workflow.completed`.
      operationId: mcpEventSubscribe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pattern:
                  type: string
                  description: "Topic pattern (e.g. 'agent.*', 'workflow.#')"
                name:
                  type: string
                  description: Subscriber name for debugging
                filter:
                  type: object
                  description: "Field-level filter: { 'data.status': 'completed' }"
              required: [pattern]
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/event_unsubscribe:
    post:
      tags: [mcp-events]
      summary: "MCP: event_unsubscribe"
      description: Remove an event bus subscription by ID.
      operationId: mcpEventUnsubscribe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                subscriptionId:
                  type: string
              required: [subscriptionId]
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/event_replay:
    post:
      tags: [mcp-events]
      summary: "MCP: event_replay"
      description: Replay events matching a topic pattern from the in-memory event history. Useful for catching up after reconnection or debugging missed events.
      operationId: mcpEventReplay
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pattern:
                  type: string
                  description: Topic pattern to replay
                since:
                  type: string
                  format: date-time
                  description: ISO timestamp to replay from
                limit:
                  type: number
                  description: Max events to return (default 50)
              required: [pattern]
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/event_bus_stats:
    post:
      tags: [mcp-events]
      summary: "MCP: event_bus_stats"
      description: Get event bus statistics — subscription count, history size, dead letter count, per-topic event counts.
      operationId: mcpEventBusStats
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: {}
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/dead_letter_replay:
    post:
      tags: [mcp-events]
      summary: "MCP: dead_letter_replay"
      description: Retry failed event deliveries from the dead letter queue.
      operationId: mcpDeadLetterReplay
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                limit:
                  type: number
                  description: Max dead letters to retry (default 50)
                olderThanMs:
                  type: number
                  description: Only retry dead letters older than this many ms
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  # ── MCP: Observability ───────────────────────────────────────────────────────

  /mcp/tools/get_metrics:
    post:
      tags: [mcp-observability]
      summary: "MCP: get_metrics"
      description: Get skill execution metrics — call counts, p50/p95/p99 latencies (ms), error rates, and worker utilization. Same data as the `/metrics` HTTP endpoint.
      operationId: mcpGetMetrics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: {}
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/list_traces:
    post:
      tags: [mcp-observability]
      summary: "MCP: list_traces"
      description: List recent distributed traces across agent calls. Shows timing, status, and span counts.
      operationId: mcpListTraces
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                limit:
                  type: number
                  description: Max traces to return (default 50)
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/get_trace:
    post:
      tags: [mcp-observability]
      summary: "MCP: get_trace"
      description: Get the waterfall visualization of a trace — shows the full call chain with timing for every span.
      operationId: mcpGetTrace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                traceId:
                  type: string
                  description: Trace ID from list_traces
              required: [traceId]
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/search_traces:
    post:
      tags: [mcp-observability]
      summary: "MCP: search_traces"
      description: Search distributed traces by skill ID, status, or time range.
      operationId: mcpSearchTraces
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                skillId:
                  type: string
                  description: Filter by skill ID
                status:
                  type: string
                  enum: [ok, error]
                since:
                  type: string
                  format: date-time
                limit:
                  type: number
                  description: Max results (default 20)
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/cache_stats:
    post:
      tags: [mcp-observability]
      summary: "MCP: cache_stats"
      description: Get skill cache statistics — hit rate, entry count, memory size, and top cached skills.
      operationId: mcpCacheStats
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: {}
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/cache_invalidate:
    post:
      tags: [mcp-observability]
      summary: "MCP: cache_invalidate"
      description: Invalidate cached results. Specify `skillId` to target a specific skill, or omit to clear the entire cache.
      operationId: mcpCacheInvalidate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                skillId:
                  type: string
                  description: Skill ID to invalidate (omit to clear all)
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/cache_configure:
    post:
      tags: [mcp-observability]
      summary: "MCP: cache_configure"
      description: Configure per-skill cache TTL. Set `ttlMs: 0` to disable caching for a skill.
      operationId: mcpCacheConfigure
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                skillId:
                  type: string
                  description: Skill to configure
                ttlMs:
                  type: number
                  description: Cache TTL in ms (0 to disable)
              required: [skillId, ttlMs]
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/get_circuit_breakers:
    post:
      tags: [mcp-observability]
      summary: "MCP: get_circuit_breakers"
      description: Get circuit breaker states for all workers — `closed` (healthy), `open` (failing fast), or `half_open` (testing recovery).
      operationId: mcpGetCircuitBreakers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: {}
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/reset_circuit_breakers:
    post:
      tags: [mcp-observability]
      summary: "MCP: reset_circuit_breakers"
      description: Reset all circuit breakers to the `closed` state, allowing traffic to all workers immediately.
      operationId: mcpResetCircuitBreakers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: {}
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/negotiate_capability:
    post:
      tags: [mcp-observability]
      summary: "MCP: negotiate_capability"
      description: Find the best agent for a skill based on SemVer version, required/preferred features, health, and active call load. Returns ranked candidates.
      operationId: mcpNegotiateCapability
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                skillId:
                  type: string
                  description: Skill to negotiate
                minVersion:
                  type: string
                  description: Minimum SemVer version (e.g. "1.2.0")
                requiredFeatures:
                  type: array
                  items:
                    type: string
                  description: Features the agent must support
                preferredFeatures:
                  type: array
                  items:
                    type: string
                  description: Preferred features (bonus scoring)
              required: [skillId]
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/list_capabilities:
    post:
      tags: [mcp-observability]
      summary: "MCP: list_capabilities"
      description: List all registered agent capabilities in the negotiation registry.
      operationId: mcpListCapabilities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: {}
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/capability_stats:
    post:
      tags: [mcp-observability]
      summary: "MCP: capability_stats"
      description: Get capability negotiation statistics — total capabilities, agents, and health summary.
      operationId: mcpCapabilityStats
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: {}
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/audit_query:
    post:
      tags: [mcp-observability]
      summary: "MCP: audit_query — Enterprise"
      description: |
        Query the immutable SQLite audit log (`~/.a2a-mcp/audit.db`). Filter by
        actor (API key prefix), skill, workspace, time range, and success/failure.
        Enterprise feature.
      operationId: mcpAuditQuery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuditQueryInput'
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/audit_stats:
    post:
      tags: [mcp-observability]
      summary: "MCP: audit_stats — Enterprise"
      description: Get audit statistics — total calls, success rate, top skills, and top actors.
      operationId: mcpAuditStats
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                since:
                  type: string
                  format: date-time
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/token_savings:
    post:
      tags: [mcp-observability]
      summary: "MCP: token_savings"
      description: Get token savings statistics from RTK-style output filtering. Shows total tokens saved, savings rate, and top skills by savings.
      operationId: mcpTokenSavings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                since:
                  type: string
                  format: date-time
                skillId:
                  type: string
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/read_raw_output:
    post:
      tags: [mcp-observability]
      summary: "MCP: read_raw_output"
      description: Read raw unfiltered output from a tee file. Call with no args to list available tee files, or provide a `path` to read a specific file.
      operationId: mcpReadRawOutput
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                path:
                  type: string
                  description: Path to the tee file
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  # ── MCP: Webhook management ──────────────────────────────────────────────────

  /mcp/tools/register_webhook:
    post:
      tags: [mcp-core]
      summary: "MCP: register_webhook"
      description: |
        Register a webhook endpoint. Returns the URL to configure in your external
        service. All incoming requests must carry a valid HMAC-SHA256
        `X-Hub-Signature-256` header computed with the provided secret.

        Use `fieldMappings` to map webhook payload fields to skill args:
        `{ "argName": "payload.path.to.field" }`.
      operationId: mcpRegisterWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Human-readable webhook name
                skillId:
                  type: string
                  description: Skill to invoke when the webhook fires (default 'delegate')
                secret:
                  type: string
                  description: HMAC-SHA256 secret for signature verification (required)
                staticArgs:
                  type: object
                  description: Static args merged with transformed payload
                fieldMappings:
                  type: object
                  description: "Map webhook payload fields to skill args: { argName: 'payload.path' }"
              required: [name, secret]
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/list_webhooks:
    post:
      tags: [mcp-core]
      summary: "MCP: list_webhooks"
      description: List all registered webhooks and their endpoints. Secrets are redacted.
      operationId: mcpListWebhooks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: {}
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/unregister_webhook:
    post:
      tags: [mcp-core]
      summary: "MCP: unregister_webhook"
      description: Remove a registered webhook by ID.
      operationId: mcpUnregisterWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: Webhook ID to remove
              required: [id]
      responses:
        '200':
          $ref: '#/components/responses/McpToolResult'

  /mcp/tools/webhook_log:
    post:
      tags: [mcp-core]
      summary: "MCP: webhook_log"
      description: Get delivery log for a specific webhook — shows timestamps, payloads, and skill results.
      operationId: mcpWebhookLog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                webhookId:
                  type: string
                limit:
                  type: number
                  description: Max entries (default 20)
