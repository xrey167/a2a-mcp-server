openapi: 3.1.0

info:
  title: a2a-mcp-server
  version: 3.0.0
  description: |
    A2A MCP Server — a Bun-only MCP server and A2A orchestrator that spawns up to 15 local
    worker agents and routes skills between them. Two protocol surfaces are exposed:

    1. **MCP (stdio)** — consumed by Claude Code via `claude mcp add`. All tool calls use
       JSON-RPC over stdin/stdout. The ~80 MCP tools are documented in this spec as
       virtual paths under `/mcp/tools/` for discoverability.
    2. **A2A HTTP (port 8080)** — JSON-RPC 2.0 over HTTP. Workers expose the same
       protocol on their own ports (8081–8095).

    ## Authentication

    **Remote callers (non-loopback):** Send `Authorization: Bearer <token>` where the
    token is either:
    - The `A2A_API_KEY` environment variable value (server-level access)
    - An `a2a_k_...` key created via the `manage_api_keys` MCP tool (RBAC-gated)

    **Loopback (127.0.0.1 / ::1):** Always trusted — no header required.

    **RBAC roles:** `admin` (all skills), `operator` (delegation, sync, most tools),
    `viewer` (read-only metrics, reports, and recall).

    ## Worker Ports

    | Worker | Port | Key Skills |
    |--------|------|-----------|
    | shell | 8081 | run_shell, read_file, write_file |
    | web | 8082 | fetch_url, call_api |
    | ai | 8083 | ask_claude, search_files, query_sqlite |
    | code | 8084 | codex_exec, codex_review |
    | knowledge | 8085 | create_note, read_note, search_notes |
    | design | 8086 | enhance_ui_prompt, suggest_screens, design_critique |
    | factory | 8087 | normalize_intent, create_project, quality_gate |
    | data | 8088 | parse_csv, parse_json, transform_data, analyze_data |
    | news | 8089 | fetch_rss, aggregate_feeds, classify_news, cluster_news |
    | market | 8090 | fetch_quote, price_history, technical_analysis, screen_market |
    | signal | 8091 | aggregate_signals, classify_threat, detect_convergence |
    | monitor | 8092 | track_conflicts, detect_surge, theater_posture |
    | infra | 8093 | cascade_analysis, supply_chain_map, chokepoint_assess |
    | climate | 8094 | fetch_earthquakes, fetch_wildfires, fetch_natural_events |
    | supply-chain | 8095 | supply chain advanced analytics |

  contact:
    name: a2a-mcp-server
    url: https://github.com/xrey167/a2a-mcp-server
  license:
    name: MIT

