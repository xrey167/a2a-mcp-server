components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: |
        Pass `Authorization: Bearer <token>` where `<token>` is either:
        - `A2A_API_KEY` env var value (server-level, `admin` role)
        - An `a2a_k_...` key created via `createApiKey` (RBAC-gated: admin/operator/viewer)

        Loopback addresses (127.0.0.1, ::1) are always trusted without a token.

        **RBAC roles:**
        | Role | Permissions |
        |------|-------------|
        | admin | All skills |
        | operator | Delegation, sync, workflows, pipelines, events, tracing, metrics |
        | viewer | Read-only: list_agents, get_metrics, recall, reports |

  schemas:

    # ── Agent Card ─────────────────────────────────────────────────────────────

    AgentCard:
      type: object
      description: A2A agent discovery card (served at `/.well-known/agent.json`)
      properties:
        name:
          type: string
          example: "Local A2A Orchestrator"
        description:
          type: string
          example: "MCP + A2A orchestrator with multi-agent workers"
        url:
          type: string
          format: uri
          example: "http://localhost:8080"
        version:
          type: string
          example: "3.0.0"
        capabilities:
          type: object
          properties:
            streaming:
              type: boolean
              example: false
        skills:
          type: array
          items:
            $ref: '#/components/schemas/SkillDescriptor'
      required: [name, description, url, version, capabilities, skills]

    SkillDescriptor:
      type: object
      properties:
        id:
          type: string
          example: "run_shell"
        name:
          type: string
          example: "Run Shell"
        description:
          type: string
          example: "Execute a shell command and return its output"
      required: [id, name, description]

    # ── A2A JSON-RPC ───────────────────────────────────────────────────────────

    TasksSendRequest:
      type: object
      description: JSON-RPC 2.0 request for `tasks/send`
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        method:
          type: string
          enum: ["tasks/send"]
        id:
          type: string
          description: Caller-provided request correlation ID
          example: "req-001"
        params:
          type: object
          properties:
            skillId:
              type: string
              description: Skill to invoke
              example: "run_shell"
            args:
              type: object
              description: Arguments for the skill
            message:
              type: object
              description: A2A message envelope (alternative to skillId+args)
              properties:
                role:
                  type: string
                  enum: [user]
                parts:
                  type: array
                  items:
                    type: object
                    properties:
                      kind:
                        type: string
                        enum: [text]
                      text:
                        type: string
            contextId:
              type: string
              description: Session ID for conversation continuity
            id:
              type: string
              description: Optional caller-assigned task ID (UUID recommended)
          required: [skillId]
      required: [jsonrpc, method, params]

    TasksGetRequest:
      type: object
      description: JSON-RPC 2.0 request for `tasks/get`
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        method:
          type: string
          enum: ["tasks/get"]
        id:
          type: string
        params:
          type: object
          properties:
            id:
              type: string
              description: Task ID to poll
          required: [id]
      required: [jsonrpc, method, params]

    TasksCancelRequest:
      type: object
      description: JSON-RPC 2.0 request for `tasks/cancel`
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        method:
          type: string
          enum: ["tasks/cancel"]
        id:
          type: string
        params:
          type: object
          properties:
            id:
              type: string
              description: Task ID to cancel
          required: [id]
      required: [jsonrpc, method, params]

    JsonRpcResponse:
      description: |
        JSON-RPC 2.0 response. Per spec, exactly ONE of `result` or `error` is
        present — never both, never neither.
      oneOf:
        - title: Success
          type: object
          description: Successful response — contains `result`, no `error` field.
          properties:
            jsonrpc:
              type: string
              enum: ["2.0"]
            id:
              type: string
            result:
              type: object
              properties:
                id:
                  type: string
                  description: Task ID
                status:
                  type: object
                  properties:
                    state:
                      type: string
                      enum: [submitted, working, completed, failed, canceled, unknown]
                artifacts:
                  type: array
                  items:
                    type: object
                    properties:
                      parts:
                        type: array
                        items:
                          $ref: '#/components/schemas/Part'
          required: [jsonrpc, id, result]
        - title: Error
          type: object
          description: Error response — contains `error`, no `result` field.
          properties:
            jsonrpc:
              type: string
              enum: ["2.0"]
            id:
              type: string
            error:
              type: object
              properties:
                code:
                  type: integer
                  example: -32601
                message:
                  type: string
                  example: "Skill not found"
                data:
                  type: object
              required: [code, message]
          required: [jsonrpc, id, error]

    Part:
      description: A2A message part — text or structured data
      oneOf:
        - type: object
          title: TextPart
          properties:
            kind:
              type: string
              enum: [text]
            text:
              type: string
          required: [kind, text]
        - type: object
          title: DataPart
          properties:
            kind:
              type: string
              enum: [data]
            data:
              type: object
          required: [kind, data]

    # ── MCP Tool Inputs ────────────────────────────────────────────────────────

    SandboxExecuteInput:
      type: object
      properties:
        code:
          type: string
          description: TypeScript code to execute in the sandbox
          example: "const result = await skill('fetch_url', { url: 'https://example.com' }); return result.slice(0, 200);"
        sessionId:
          type: string
          description: Session ID for variable persistence across calls
        timeout:
          type: number
          description: Execution timeout in seconds (default 30)
        action:
          type: string
          enum: [list_vars, get_var, delete_var]
          description: Variable management action (alternative to running code)
        varName:
          type: string
          description: Variable name (for get_var/delete_var actions)

    DelegateInput:
      type: object
      properties:
        skillId:
          type: string
          description: Skill to invoke (e.g. run_shell, ask_claude, fetch_url)
          example: "run_shell"
        args:
          type: object
          description: Arguments passed to the skill
          example:
            command: "echo hello"
        agentUrl:
          type: string
          format: uri
          description: Direct worker URL — bypasses skill lookup
          example: "http://localhost:8081"
        message:
          type: string
          description: Natural-language context message
        sessionId:
          type: string
          description: Enables session continuity (history stored in memory)
        async:
          type: boolean
          description: If true, run asynchronously and return taskId immediately
        taskId:
          type: string
          description: Poll result of a previous async delegate call

    WorkflowExecuteInput:
      type: object
      properties:
        workflow:
          $ref: '#/components/schemas/WorkflowDefinition'
      required: [workflow]

    WorkflowDefinition:
      type: object
      description: DAG-based multi-step workflow definition
      properties:
        id:
          type: string
          description: Unique workflow ID
          example: "research-and-save"
        name:
          type: string
          description: Human-readable name
        description:
          type: string
        steps:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowStep'
        maxConcurrency:
          type: number
          description: Maximum number of concurrent step executions
      required: [id, steps]

    WorkflowStep:
      type: object
      properties:
        id:
          type: string
          description: Unique step ID within the workflow
          example: "fetch"
        skillId:
          type: string
          description: Skill to invoke
          example: "fetch_url"
        args:
          type: object
          description: "Arguments for the skill. Supports {{stepId.result}} template references."
        message:
          type: string
          description: Optional message text
        dependsOn:
          type: array
          items:
            type: string
          description: Step IDs that must complete before this step runs
        onError:
          type: string
          enum: [fail, skip, retry]
          description: Error handling strategy (default 'fail')
        maxRetries:
          type: number
          description: Max retries (only when onError is 'retry')
        when:
          type: string
          description: "Condition expression — skip step if falsy. E.g. '{{prev.result}}'"
        label:
          type: string
          description: Human-readable label for progress reporting
      required: [id, skillId]

    DesignWorkflowInput:
      type: object
      properties:
        appConcept:
          type: string
          description: Description of the app concept
          example: "A habit tracker with streaks and social accountability"
        title:
          type: string
          description: App title (defaults to appConcept)
        deviceType:
          type: string
          enum: [MOBILE, TABLET, DESKTOP, WEB]
          default: MOBILE
        screensOnly:
          type: boolean
          description: If true, generate a single enhanced screen instead of a full app
        modelId:
          type: string
          description: Gemini model to use (default 'GEMINI_3_FLASH')
      required: [appConcept]

    FactoryWorkflowInput:
      type: object
      properties:
        idea:
          type: string
          description: Project idea description
          example: "A REST API for managing team time-off requests with approval workflows"
        pipeline:
          type: string
          enum: [app, website, mcp-server, agent, api, cli]
          default: app
          description: Project type pipeline
        outputDir:
          type: string
          description: Output directory for the generated project
      required: [idea]

    CollaborateInput:
      type: object
      properties:
        strategy:
          type: string
          enum: [fan_out, consensus, debate, map_reduce]
          description: Collaboration strategy
        query:
          type: string
          description: The question or task for agents to collaborate on
        agents:
          type: array
          items:
            type: string
          description: Agent names or skill IDs to involve
        mergeStrategy:
          type: string
          enum: [concat, best_score, majority_vote, custom]
          description: How to merge responses
        maxRounds:
          type: number
          description: For debate strategy — max refinement rounds (default 2)
        items:
          type: array
          description: For map_reduce strategy — items to distribute
        mergePrompt:
          type: string
          description: Custom merge prompt (for 'custom' merge strategy)
        timeoutMs:
          type: number
          description: Timeout per agent call in ms (default 60000)
        judgeAgent:
          type: string
          description: Agent/skill for scoring/synthesis (default 'ask_claude')
      required: [strategy, query, agents]

    OsintBriefInput:
      type: object
      properties:
        region:
          type: string
          description: ISO country code or region name
          example: "UA"
        since:
          type: string
          format: date-time
          description: ISO timestamp lower bound for data window
        sources:
          type: array
          items:
            type: string
            enum: [news, market, signal, monitor, infra, climate]
          description: OSINT sources to include (default all)

    AuditQueryInput:
      type: object
      properties:
        actor:
          type: string
          description: API key prefix or 'local'
          example: "a2a_k_abc1"
        skillId:
          type: string
          description: Filter by skill ID
        workspace:
          type: string
          description: Filter by workspace ID
        since:
          type: string
          format: date-time
          description: ISO timestamp start
        until:
          type: string
          format: date-time
          description: ISO timestamp end
        success:
          type: boolean
          description: Filter by success or failure
        limit:
          type: number
          description: Max results (default 100, max 1000)

    ErpConnectorConnectInput:
      type: object
      properties:
        type:
          type: string
          enum: [odoo, business-central, dynamics]
          description: ERP system type
        authMode:
          type: string
          enum: [oauth, api-key]
        config:
          type: object
          description: Connector credentials/settings (provider-specific)
        metadata:
          type: object
          description: "Connector metadata: tenantId, tokenExpiresAt, webhookExpiresAt, odooPlan, instanceUrl"
        enabled:
          type: boolean
          description: Enable connector after connecting (default true)
          default: true
      required: [type, authMode]

    ErpConnectorSyncInput:
      type: object
      properties:
        type:
          type: string
          enum: [odoo, business-central, dynamics]
        direction:
          type: string
          enum: [ingest, writeback, two-way]
          default: two-way
        entityType:
          type: string
          enum: [lead, deal, invoice, quote, order]
          default: lead
        externalId:
          type: string
        idempotencyKey:
          type: string
          description: Idempotency key to prevent duplicate syncs
        payload:
          type: object
        maxRetries:
          type: number
          description: Max retry attempts (default 3, max 5)
          default: 3
      required: [type]

    WorkspaceManageInput:
      type: object
      properties:
        action:
          type: string
          enum: [create, list, get, add_member, remove_member, update]
        id:
          type: string
          description: Workspace ID (for get/update/add_member/remove_member)
        name:
          type: string
          description: Workspace or member name
        ownerName:
          type: string
          description: Owner display name (required for create)
        description:
          type: string
        keyPrefix:
          type: string
          description: API key prefix — owner key for create, member key for add_member/remove_member
        role:
          type: string
          enum: [member, readonly]
        env:
          type: object
          description: Shared environment variables
        allowedSkills:
          type: array
          items:
            type: string
          description: Skill allowlist
      required: [action]

    # ── Health and Metrics ─────────────────────────────────────────────────────

    HealthDetails:
      type: object
      properties:
        status:
          type: string
          enum: [ok]
        uptime:
          type: number
          description: Process uptime in seconds
        workers:
          type: object
          additionalProperties:
            type: boolean
          description: "Map of worker name → healthy boolean"
        tasks:
          type: object
          properties:
            total:
              type: integer
            active:
              type: integer
        connectors:
          type: object
          description: ERP connector KPI snapshot

    MetricsSnapshot:
      type: object
      description: Per-skill execution metrics — keyed by skill ID
      additionalProperties:
        type: object
        properties:
          calls:
            type: integer
            description: Total call count
          errors:
            type: integer
            description: Total error count
          p50Ms:
            type: number
            description: Median latency in milliseconds
          p95Ms:
            type: number
            description: 95th percentile latency in milliseconds
          p99Ms:
            type: number
            description: 99th percentile latency in milliseconds

    # ── Error ──────────────────────────────────────────────────────────────────

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message
          example: "Unauthorized — set Authorization: Bearer <A2A_API_KEY>"
      required: [error]

    # ── MCP Tool Result ────────────────────────────────────────────────────────

    McpToolResult:
      type: object
      description: MCP tool call result envelope
      properties:
        content:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: [text]
              text:
                type: string
        isError:
          type: boolean
          description: True if the tool encountered an error

    TaskIdResult:
      type: object
      description: Immediate response for async tools that return a task ID
      properties:
        taskId:
          type: string
          description: Task ID — poll with `delegate(taskId)` or SSE stream
          example: "task-abc123"
        status:
          type: string
          enum: [working, completed, failed]
        hint:
          type: string
          example: "Poll with get_task_result"
      required: [taskId, status]

  responses:
    McpToolResult:
      description: MCP tool result (success or error)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/McpToolResult'

    McpTaskIdResult:
      description: Async task started — returns taskId for polling
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/McpToolResult'
          example:
            content:
              - type: "text"
                text: '{"taskId":"task-abc123","status":"working","hint":"Poll with get_task_result"}'

    Unauthorized:
      description: Missing or invalid Authorization header
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "Unauthorized — set Authorization: Bearer <A2A_API_KEY>"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: "Not found"
