# fly.toml — Deploy a2a-mcp-server to Fly.io
# Usage: fly launch --copy-config && fly deploy

app = "a2a-mcp-server"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  A2A_PORT = "8080"
  A2A_LOG_LEVEL = "info"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "15s"
  interval = "15s"
  method = "GET"
  path = "/healthz"
  timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
