services:
  a2a-mcp:
    build: .
    ports:
      - "8080:8080"    # A2A orchestrator
    volumes:
      - a2a-data:/data                    # SQLite databases
      - ${A2A_CONFIG_DIR:-./config}:/root/.a2a-mcp  # Config (optional)
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - A2A_PORT=8080
      - A2A_API_KEY=${A2A_API_KEY:-}
      - A2A_MEMORY_DB=/data/a2a-memory.db
      - OBSIDIAN_VAULT=/data/knowledge    # Self-contained knowledge base
    restart: unless-stopped

volumes:
  a2a-data:
